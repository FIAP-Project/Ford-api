worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    sendfile      on;
    server_tokens off;
    client_max_body_size 64k;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_id":"$http_x_request_id",'
            '"upstream":"$upstream_addr"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # ---------- Rate limiting ----------
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ---------- Upstreams ----------
    upstream auth_upstream    { server auth-service:8001;    keepalive 16; }
    upstream user_upstream    { server user-service:8002;    keepalive 16; }
    upstream vehicle_upstream { server vehicle-service:8003; keepalive 16; }
    upstream audit_upstream   { server audit-service:8004;   keepalive 16; }

    map $request_method $cors_origin {
        default $http_origin;
    }

    server {
        listen 8443 ssl;
        http2  on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "no-referrer" always;

        # Global throttle + connection cap
        limit_req zone=global burst=20 nodelay;
        limit_conn conn_per_ip 50;

        # Generic proxy params shared by all upstreams
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $http_x_request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # ----- auth-service -----
        location /auth/login {
            limit_req zone=auth_login burst=3 nodelay;
            proxy_pass http://auth_upstream;
        }
        location /auth/ {
            proxy_pass http://auth_upstream;
        }

        # ----- user-service -----
        location /users/ {
            proxy_pass http://user_upstream;
        }

        # ----- vehicle-service -----
        location /vehicles/ {
            proxy_read_timeout 120s; # Claude calls can be slow
            proxy_pass http://vehicle_upstream;
        }

        # ----- audit-service -----
        location /audit/ {
            proxy_pass http://audit_upstream;
        }

        # Each service exposes its own Swagger UI; expose them under /<svc>/docs
        location /auth/docs       { proxy_pass http://auth_upstream;    }
        location /auth/openapi.json    { proxy_pass http://auth_upstream;    }
        location /users/docs      { proxy_pass http://user_upstream;    }
        location /users/openapi.json   { proxy_pass http://user_upstream;    }
        location /vehicles/docs   { proxy_pass http://vehicle_upstream; }
        location /vehicles/openapi.json { proxy_pass http://vehicle_upstream; }
        location /audit/docs      { proxy_pass http://audit_upstream;   }
        location /audit/openapi.json   { proxy_pass http://audit_upstream;   }

        location = / {
            return 200 '{"service":"ford-api-gateway","status":"ok","endpoints":["/auth","/users","/vehicles","/audit"]}';
            add_header Content-Type application/json;
        }
    }
}
