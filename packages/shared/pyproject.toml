[project]
name = "ford-shared"
version = "0.1.0"
description = "Shared utilities for Ford API services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "aio-pika>=9.4",
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.0",
    "fastapi>=0.111",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ford_shared"]
